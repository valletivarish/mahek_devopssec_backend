# ============================================
# Backend CI/CD Pipeline - Event RSVP and Attendance Manager
# This pipeline runs static analysis, security scanning, tests,
# and deploys the Spring Boot application to AWS EC2.
# ============================================

name: Backend CI/CD Pipeline

# Trigger pipeline on push to main branch and on pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # CI Stage: Build, Test, Analyse, and Scan
  # Runs on every push and pull request
  # ============================================
  ci:
    name: CI - Build, Test & Analyse
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 with Maven caching for faster builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile the project and run unit tests
      - name: Build and Run Tests
        run: mvn clean test -B

      # Step 4: Run full verification including SpotBugs, PMD, and JaCoCo
      # This executes all static analysis tools configured in pom.xml
      - name: Run Static Analysis (SpotBugs, PMD, JaCoCo)
        run: mvn verify -B -DskipTests

      # Step 5: Run Trivy filesystem scan for dependency vulnerabilities
      - name: Security Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-report.txt'

      # Step 6: Upload SpotBugs analysis report as a build artifact
      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 30

      # Step 7: Upload PMD analysis report as a build artifact
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 30

      # Step 8: Upload JaCoCo code coverage report as a build artifact
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

      # Step 9: Upload Trivy security scan report as a build artifact
      - name: Upload Trivy Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 30

      # Step 10: Upload the compiled JAR for the CD stage
      - name: Upload Application JAR
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 5

  # ============================================
  # CD Stage: Deploy to AWS EC2
  # Only runs on push to main branch (not on PRs)
  # ============================================
  cd:
    name: CD - Deploy to AWS EC2
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1: Download the compiled JAR from the CI stage
      - name: Download Application JAR
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: deploy/

      # Step 2: Copy JAR to EC2 via SCP (must happen BEFORE restarting the service)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      # Step 3: Deploy the JAR and restart the application service via SSH
      - name: Deploy and Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing application if running
            sudo systemctl stop event-rsvp.service || true
            # Copy new JAR to application directory
            sudo cp /home/ec2-user/*.jar /opt/event-rsvp/event-rsvp-backend.jar
            sudo chown eventrsvp:eventrsvp /opt/event-rsvp/event-rsvp-backend.jar
            # Start the application with production profile
            sudo systemctl start event-rsvp.service
            # Wait for startup
            sleep 15
            # Verify the service is running
            sudo systemctl is-active event-rsvp.service

      # Step 4: Smoke test - verify the application is running
      - name: Smoke Test - Health Check
        run: |
          echo "Waiting for application to fully start..."
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }}:8080/api/health || echo "Health check pending - server may still be starting"
