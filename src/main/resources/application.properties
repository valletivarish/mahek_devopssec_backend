# ============================================
# Event RSVP and Attendance Manager - Application Configuration
# ============================================

# Application name and server port
spring.application.name=event-rsvp-manager
server.port=8080

# ============================================
# MySQL Database Configuration
# Uses MySQL for persistent data storage in development and production
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/event_rsvp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/Hibernate Configuration
# update mode auto-creates and updates tables based on entity definitions
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Security Configuration
# Secret key for signing tokens and expiration time in milliseconds
# In production, these values should be set via environment variables
# ============================================
jwt.secret=EventRsvpManagerSecretKeyForJWTTokenGeneration2024SecureKey
jwt.expiration=86400000

# ============================================
# Swagger/OpenAPI Documentation
# Accessible at http://localhost:8080/swagger-ui.html
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# Logging Configuration
# ============================================
logging.level.com.eventmanager=DEBUG
logging.level.org.springframework.security=INFO
