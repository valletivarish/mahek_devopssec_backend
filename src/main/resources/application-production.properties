# Database connects to the RDS MySQL instance in the private subnet.
# =============================================================================

# Server Configuration
server.port=8080

# MySQL Database - RDS Instance
spring.datasource.url=jdbc:mysql://event-rsvp-database.chomi68g49az.eu-west-1.rds.amazonaws.com:3306/event_rsvp_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=EventRsvp2024Secure!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
