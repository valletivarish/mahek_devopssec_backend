# ============================================
# Test Profile Configuration
# Uses H2 in-memory database instead of MySQL for fast, isolated testing
# ============================================

# H2 in-memory database for testing (no external database required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA settings for test environment
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT test configuration with a dedicated test secret key
jwt.secret=TestSecretKeyForJWTTokenGenerationInTestEnvironment2024
jwt.expiration=86400000

# Disable SQL logging in tests for cleaner output
logging.level.org.hibernate.SQL=OFF
